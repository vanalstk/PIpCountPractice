<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pip Trainer">
  <title>Backgammon Pip Count Trainer</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#fafaf8;font-family:Georgia,'Times New Roman',serif;color:#111;-webkit-text-size-adjust:100%;touch-action:manipulation}
    #app{max-width:680px;margin:0 auto;padding:16px 14px 60px;min-height:100%}
    .header{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:10px}
    #board-wrap{margin-bottom:10px}
    svg{display:block;width:100%;height:auto}
    .pos-label{font-size:12px;color:#777;font-style:italic;margin-bottom:14px}
    .inputs{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
    .input-group{display:flex;flex-direction:column;gap:5px}
    .input-group label{font-size:12px;color:#555}
    .input-group input{width:110px;padding:10px 12px;font-size:18px;border:1px solid #bbb;border-radius:4px;font-family:Georgia,serif;background:#fff;-webkit-appearance:none;appearance:none;outline:none}
    .input-group input:focus{border-color:#555}
    .error{font-size:12px;color:#dc2626;margin-bottom:10px;min-height:18px}
    .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    button{padding:11px 20px;font-size:14px;cursor:pointer;border:1.5px solid #333;border-radius:4px;background:#fff;font-family:Georgia,serif;color:#111;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
    button:active{background:#111;color:#fff}
    .hint-box{border:1px solid #ccc;border-radius:4px;padding:12px 14px;font-size:13px;color:#444;margin-bottom:14px;line-height:1.65;background:#f5f5f0;font-style:italic}
    .result-box{border:1px solid #ccc;border-radius:4px;padding:14px 16px;background:#fff;margin-bottom:10px}
    .result-title{font-size:11px;font-weight:bold;letter-spacing:.08em;margin-bottom:12px;color:#333}
    .result-row{display:flex;gap:20px;flex-wrap:wrap}
    .result-col{flex:1;min-width:130px}
    .result-side{font-size:11px;color:#999;margin-bottom:4px}
    .result-actual{font-size:28px;font-weight:bold;letter-spacing:-.02em}
    .result-detail{font-size:12px;color:#666;margin-top:4px}
    .score-badge{display:inline-block;margin-top:6px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:bold;letter-spacing:.05em}
    .result-lead{margin-top:12px;font-size:12px;color:#666;border-top:1px solid #eee;padding-top:10px}
    .score-bar{display:flex;gap:14px;font-size:11px;color:#888;margin-bottom:14px;align-items:center;flex-wrap:wrap}
    .score-bar span{color:#333;font-weight:bold}
  </style>
</head>
<body>
<div id="app">
  <div class="header">Backgammon &middot; Pip Count Trainer</div>
  <div class="score-bar">

    </div>
    <div class="input-group">
      <label>&#9679; Black pips</label>
      <input type="number" id="gb" inputmode="numeric" pattern="[0-9]*" placeholder="&mdash;">
    </div>
  </div>
  <div class="error" id="err"></div>
  <div class="buttons">
    <button id="btn-reveal">Reveal answer</button>
    <button id="btn-hint">Hint</button>
    <button id="btn-next">New position</button>
  </div>
  <div id="hint-area"></div>
  <div id="result-area"></div>
</div>

    }
    for(let i=0;i<Math.min(bc,mx);i++){
      const cy=top?TP+CR+2+i*STEP:TP+BH-CR-2-i*STEP;
      parts.push(drawChecker(cx,cy,false,i===mx-1&&bc>mx?bc:0));
    }
  }
  parts.push('<text x="'+ptCX(1)+'" y="'+(TP+BH+15)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">1</text>');
  parts.push('<text x="'+ptCX(24)+'" y="'+(TP-14)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">24</text>');
  const ay=TP+BH+38,ax1=ptCX(24),ax2=ptCX(1),hs=9;
  parts.push('<line x1="'+ax1+'" y1="'+ay+'" x2="'+(ax2-hs)+'" y2="'+ay+'" stroke="#555" stroke-width="1.5"/>');
  parts.push('<polygon points="'+ax2+','+ay+' '+(ax2-hs)+','+(ay-hs*0.6)+' '+(ax2-hs)+','+(ay+hs*0.6)+'" fill="#555"/>');
  parts.push('<text x="'+((ax1+ax2)/2)+'" y="'+(ay-11)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">White</text>');
  parts.push('</svg>');
  return parts.join('');
}

let posIdx=Math.floor(Math.random()*POSITIONS.length);
let showHint=false;
let stats={count:0,ex:0,good:0,off:0};

function getPos(){return POSITIONS[posIdx];}

function render(){
  const pos=getPos();
  document.getElementById('board-wrap').innerHTML=buildBoard(pos);
  document.getElementById('pos-label').textContent=pos.label;
  document.getElementById('hint-area').innerHTML='';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('err').textContent='';
  document.getElementById('gw').value='';
  document.getElementById('gb').value='';
  showHint=false;
  document.getElementById('btn-hint').textContent='Hint';
  updateScoreBar();
}

function updateScoreBar(){
  document.getElementById('sc-count').textContent=stats.count;
  document.getElementById('sc-ex').textContent=stats.ex;
  document.getElementById('sc-good').textContent=stats.good;
  document.getElementById('sc-off').textContent=stats.off;
}

function scoreGuess(guess,actual){
  const d=Math.abs(guess-actual);
  if(d<=3) return {label:'Excellent!',color:'#16a34a'};
  if(d<=7) return {label:'Good',color:'#ca8a04'};
  if(d<=15) return {label:'Close',color:'#ea580c'};
  return {label:'Off',color:'#dc2626'};
}

function handleReveal(e){
  if(e) e.preventDefault();
  const gw=parseInt(document.getElementById('gw').value);
  const gb=parseInt(document.getElementById('gb').value);
  if(isNaN(gw)||isNaN(gb)){
    document.getElementById('err').textContent='Enter a pip count for both sides first.';
    return;
  }
  document.getElementById('err').textContent='';
  const pos=getPos();
  const aw=calcPips(pos.white,true),ab=calcPips(pos.black,false);
  const sw=scoreGuess(gw,aw),sb=scoreGuess(gb,ab);
  stats.count++;
  const worst=Math.max(Math.abs(gw-aw),Math.abs(gb-ab));
  if(worst<=3) stats.ex++;
  else if(worst<=7) stats.good++;
  else stats.off++;
  updateScoreBar();
  const lead=aw<ab?'White leads by '+(ab-aw)+' pips':aw>ab?'Black leads by '+(aw-ab)+' pips':'Dead heat!';
  function col(side,actual,guess,sc){
    return '<div class="result-col">'
      +'<div class="result-side">'+side+'</div>'
      +'<div class="result-actual">'+actual+'</div>'
      +'<div class="result-detail">Your guess: '+guess+' &middot; off by '+Math.abs(guess-actual)+'</div>'
      +'<div class="score-badge" style="border:1px solid '+sc.color+';color:'+sc.color+';background:'+sc.color+'18">'+sc.label+'</div>'
      +'</div>';
  }
  document.getElementById('result-area').innerHTML='<div class="result-box">'
    +'<div class="result-title">RESULTS</div>'
    +'<div class="result-row">'+col('&#9675; White',aw,gw,sw)+col('&#9679; Black',ab,gb,sb)+'</div>'
    +'<div class="result-lead">'+lead+'</div>'
    +'</div>';
}

function toggleHint(e){
  if(e) e.preventDefault();
  showHint=!showHint;
  const pos=getPos();
  document.getElementById('hint-area').innerHTML=showHint?'<div class="hint-box">'+pos.hint+'</div>':'';
  document.getElementById('btn-hint').textContent=showHint?'Hide hint':'Hint';
}

function nextPos(e){
  if(e) e.preventDefault();
  let n=posIdx;
  while(n===posIdx) n=Math.floor(Math.random()*POSITIONS.length);
  posIdx=n;
  render();
}

document.getElementById('btn-reveal').addEventListener('click',handleReveal);
document.getElementById('btn-hint').addEventListener('click',toggleHint);
document.getElementById('btn-next').addEventListener('click',nextPos);
document.getElementById('gb').addEventListener('keydown',function(e){if(e.key==='Enter')handleReveal();});
document.getElementById('gw').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('gb').focus();});

render();

</script>
</body>
</html>
