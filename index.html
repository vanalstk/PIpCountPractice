<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pip Trainer">
  <title>Backgammon Pip Count Trainer</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#fafaf8;font-family:Georgia,'Times New Roman',serif;color:#111;-webkit-text-size-adjust:100%;touch-action:manipulation;font-size:18px}
    #app{max-width:680px;margin:0 auto;padding:20px 18px 60px;min-height:100%}
    .header{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:14px}
    #board-wrap{margin-bottom:12px}
    svg{display:block;width:100%;height:auto}
    .pos-label{font-size:16px;color:#777;font-style:italic;margin-bottom:16px}
    .inputs{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap}
    .input-group{display:flex;flex-direction:column;gap:8px}
    .input-group label{font-size:16px;color:#555}
    .input-group input{width:130px;padding:12px 14px;font-size:22px;border:1px solid #bbb;border-radius:4px;font-family:Georgia,serif;background:#fff;-webkit-appearance:none;appearance:none;outline:none}
    .input-group input:focus{border-color:#555}
    .timer-display{font-size:17px;color:#888;font-variant-numeric:tabular-nums;min-height:24px;font-style:italic}
    .timer-display.running{color:#c47a00}
    .timer-display.stopped{color:#555}
    .error{font-size:15px;color:#dc2626;margin-bottom:12px;min-height:22px}
    .buttons{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    button{padding:14px 24px;font-size:17px;cursor:pointer;border:1.5px solid #333;border-radius:4px;background:#fff;font-family:Georgia,serif;color:#111;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
    button:active{background:#111;color:#fff}
    .hint-box{border:1px solid #ccc;border-radius:4px;padding:14px 16px;font-size:16px;color:#444;margin-bottom:16px;line-height:1.7;background:#f5f5f0;font-style:italic}
    .result-box{border:1px solid #ccc;border-radius:4px;padding:16px 18px;background:#fff;margin-bottom:12px}
    .result-title{font-size:14px;font-weight:bold;letter-spacing:.08em;margin-bottom:14px;color:#333}
    .result-row{display:flex;gap:24px;flex-wrap:wrap}
    .result-col{flex:1;min-width:140px}
    .result-side{font-size:14px;color:#999;margin-bottom:6px}
    .result-actual{font-size:36px;font-weight:bold;letter-spacing:-.02em}
    .result-detail{font-size:15px;color:#666;margin-top:6px}
    .score-badge{display:inline-block;margin-top:8px;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:bold;letter-spacing:.05em}
    .result-lead{margin-top:14px;font-size:15px;color:#666;border-top:1px solid #eee;padding-top:12px}
    .score-bar{display:flex;gap:16px;font-size:15px;color:#888;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .score-bar span{color:#333;font-weight:bold}
  </style>
</head>
<body>
<div id="app">
  <div class="header">Backgammon &middot; Pip Count Trainer</div>
  <div class="score-bar">
    Positions: <span id="sc-count">0</span>
    &nbsp;&nbsp;Excellent (&le;3): <span id="sc-ex">0</span>
    &nbsp;&nbsp;Good (&le;7): <span id="sc-good">0</span>
    &nbsp;&nbsp;Off: <span id="sc-off">0</span>
  </div>
  <div id="board-wrap"></div>
  <div class="pos-label" id="pos-label"></div>
  <div class="inputs">
    <div class="input-group">
      <label>&#9675; White pips</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <button id="btn-start" style="padding:10px 18px;font-size:17px;background:#111;color:#fff;border:1.5px solid #111;border-radius:4px;font-family:Georgia,serif;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;">Start</button>
        <div class="timer-display" id="tw">&mdash;</div>
      </div>
      <input type="number" id="gw" inputmode="numeric" pattern="[0-9]*" placeholder="&mdash;">
    </div>
    <div class="input-group">
      <label>&#9679; Black pips</label>
      <div class="timer-display" id="tb" style="margin-bottom:6px;">&mdash;</div>
      <input type="number" id="gb" inputmode="numeric" pattern="[0-9]*" placeholder="&mdash;">
    </div>
  </div>
  <div class="error" id="err"></div>
  <div class="buttons">
    <button id="btn-reveal">Reveal answer</button>
    <button id="btn-hint">Hint</button>
    <button id="btn-next">New position</button>
  </div>
  <div id="hint-area"></div>
  <div id="result-area"></div>
</div>

<script>
var PW=44,BW=28,BH=390,HH=165,TP=30,CR=15,STEP=32;
var BOARD_W=PW*12+BW, TOTAL_H=TP+BH+56;
 
function ptX(p){
  if(p>=19&&p<=24) return BW+(p-19)*PW+6*PW;
  if(p>=13&&p<=18) return (p-13)*PW;
  if(p>=7 &&p<=12) return (12-p)*PW;
  return BW+(6-p)*PW+6*PW;
}
function ptCX(p){return ptX(p)+PW/2;}
function isTop(p){return p>=13;}
 
function calcPips(arr,isWhite){
  var t=0;
  for(var i=1;i<=24;i++) t+=(arr[i]||0)*(isWhite?i:25-i);
  return t;
}
 
function drawChecker(cx,cy,white,lbl){
  var fill=white?'#fff':'#888', inner=white?'#ddd':'#aaa';
  var o='<circle cx="'+cx+'" cy="'+cy+'" r="'+CR+'" fill="'+fill+'" stroke="#111" stroke-width="1.5"/>';
  o+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(CR-4)+'" fill="none" stroke="'+inner+'" stroke-width="0.8"/>';
  if(lbl>0){var tc=white?'#111':'#fff';o+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-size="9" fill="'+tc+'" font-weight="bold">'+lbl+'</text>';}
  return o;
}
 
function buildBoard(pos){
  var midY=TP+BH/2, barX=6*PW;
  var p,x,cx,top,filled,fill,pts,i,wc,bc,cy,mx=5;
  var out='<svg viewBox="0 0 '+BOARD_W+' '+TOTAL_H+'" xmlns="http://www.w3.org/2000/svg">';
  out+='<rect x="0" y="'+TP+'" width="'+BOARD_W+'" height="'+BH+'" fill="#fff" stroke="#111" stroke-width="2"/>';
  out+='<rect x="'+barX+'" y="'+TP+'" width="'+BW+'" height="'+BH+'" fill="#e8e8e8" stroke="#111" stroke-width="1"/>';
  out+='<line x1="0" y1="'+midY+'" x2="'+BOARD_W+'" y2="'+midY+'" stroke="#111" stroke-width="0.8" stroke-dasharray="5 4"/>';
  for(p=1;p<=24;p++){
    x=ptX(p); cx=ptCX(p); top=isTop(p); filled=p%2===1;
    fill=filled?'#111':'#fff';
    if(top) pts=x+','+TP+' '+(x+PW)+','+TP+' '+cx+','+(TP+HH);
    else    pts=x+','+(TP+BH)+' '+(x+PW)+','+(TP+BH)+' '+cx+','+(TP+BH-HH);
    out+='<polygon points="'+pts+'" fill="'+fill+'" stroke="#111" stroke-width="0.8"/>';
  }
  for(p=1;p<=24;p++){
    wc=pos.white[p]||0; bc=pos.black[p]||0;
    cx=ptCX(p); top=isTop(p);
    for(i=0;i<Math.min(wc,mx);i++){
      cy=top?TP+CR+2+i*STEP:TP+BH-CR-2-i*STEP;
      out+=drawChecker(cx,cy,true,i===mx-1&&wc>mx?wc:0);
    }
    for(i=0;i<Math.min(bc,mx);i++){
      cy=top?TP+CR+2+i*STEP:TP+BH-CR-2-i*STEP;
      out+=drawChecker(cx,cy,false,i===mx-1&&bc>mx?bc:0);
    }
  }
  out+='<text x="'+ptCX(1)+'" y="'+(TP+BH+15)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">1</text>';
  out+='<text x="'+ptCX(24)+'" y="'+(TP-14)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">24</text>';
  var ay=TP+BH+38, ax1=ptCX(24), ax2=ptCX(1), hs=9;
  out+='<line x1="'+ax1+'" y1="'+ay+'" x2="'+(ax2-hs)+'" y2="'+ay+'" stroke="#555" stroke-width="1.5"/>';
  out+='<polygon points="'+ax2+','+ay+' '+(ax2-hs)+','+(ay-hs*0.6)+' '+(ax2-hs)+','+(ay+hs*0.6)+'" fill="#555"/>';
  out+='<text x="'+((ax1+ax2)/2)+'" y="'+(ay-11)+'" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555" font-style="italic">White</text>';
  out+='</svg>';
  return out;
}
 
// Timer state
var wStart=0, bStart=0;
var wElapsed=0, bElapsed=0;
var wRunning=false, bRunning=false;
var wStopped=false, bStopped=false;
var tickInterval=null;
 
function fmtTime(ms){
  var s=Math.floor(ms/1000);
  var tenths=Math.floor((ms%1000)/100);
  return s+'.'+tenths+'s';
}
 
function tickTimers(){
  var now=Date.now();
  if(wRunning && !wStopped){
    var tw=document.getElementById('tw');
    tw.textContent=fmtTime(now-wStart);
    tw.className='timer-display running';
  }
  if(bRunning && !bStopped){
    var tb=document.getElementById('tb');
    tb.textContent=fmtTime(now-bStart);
    tb.className='timer-display running';
  }
}
 
function startTimerW(){
  if(wStopped) return;
  if(!wRunning){
    wStart=Date.now();
    wRunning=true;
    if(!tickInterval) tickInterval=setInterval(tickTimers,100);
  }
}
 
function startTimerB(){
  if(bStopped) return;
  if(!bRunning){
    bStart=Date.now();
    bRunning=true;
    if(!tickInterval) tickInterval=setInterval(tickTimers,100);
  }
}
 
function stopTimerW(){
  if(wRunning && !wStopped){
    wElapsed=Date.now()-wStart;
    wStopped=true;
    var tw=document.getElementById('tw');
    tw.innerHTML=fmtTime(wElapsed);
    tw.className='timer-display stopped';
  }
}
 
function stopTimerB(){
  if(bRunning && !bStopped){
    bElapsed=Date.now()-bStart;
    bStopped=true;
    var tb=document.getElementById('tb');
    tb.innerHTML=fmtTime(bElapsed);
    tb.className='timer-display stopped';
  }
}
 
function resetTimers(){
  wStart=0; bStart=0;
  wElapsed=0; bElapsed=0;
  wRunning=false; bRunning=false;
  wStopped=false; bStopped=false;
  if(tickInterval){clearInterval(tickInterval);tickInterval=null;}
  document.getElementById('tw').textContent='\u2014';
  document.getElementById('tw').className='timer-display';
  document.getElementById('tb').textContent='\u2014';
  document.getElementById('tb').className='timer-display';
  var btn=document.getElementById('btn-start');
  btn.textContent='Start';
  btn.style.background='#111';
  btn.style.borderColor='#111';
}
 
// Start button triggers white timer
document.getElementById('btn-start').addEventListener('click', function(){
  resetTimers();
  startTimerW();
  document.getElementById('gw').focus();
  this.textContent='Running...';
  this.style.background='#c47a00';
  this.style.borderColor='#c47a00';
});
document.getElementById('gw').addEventListener('blur', function(){
  stopTimerW();
});
document.getElementById('gb').addEventListener('focus', function(){
  stopTimerW(); // ensure white stops when black starts
  startTimerB();
});
document.getElementById('gb').addEventListener('blur', stopTimerB);
 
// State
var posIdx=Math.floor(Math.random()*POSITIONS.length);
var showHint=false;
var stats={count:0,ex:0,good:0,off:0};
 
function getPos(){return POSITIONS[posIdx];}
 
function updateScoreBar(){
  document.getElementById('sc-count').textContent=stats.count;
  document.getElementById('sc-ex').textContent=stats.ex;
  document.getElementById('sc-good').textContent=stats.good;
  document.getElementById('sc-off').textContent=stats.off;
}
 
function render(){
  var pos=getPos();
  document.getElementById('board-wrap').innerHTML=buildBoard(pos);
  document.getElementById('pos-label').textContent=pos.label;
  document.getElementById('hint-area').innerHTML='';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('err').textContent='';
  document.getElementById('gw').value='';
  document.getElementById('gb').value='';
  showHint=false;
  document.getElementById('btn-hint').textContent='Hint';
  resetTimers();
  updateScoreBar();
}
 
function scoreGuess(guess,actual){
  var d=Math.abs(guess-actual);
  if(d<=3) return {label:'Excellent!',color:'#16a34a'};
  if(d<=7) return {label:'Good',color:'#ca8a04'};
  if(d<=15) return {label:'Close',color:'#ea580c'};
  return {label:'Off',color:'#dc2626'};
}
 
function handleReveal(){
  var gw=parseInt(document.getElementById('gw').value);
  var gb=parseInt(document.getElementById('gb').value);
  if(isNaN(gw)||isNaN(gb)){
    document.getElementById('err').textContent='Enter a pip count for both sides first.';
    return;
  }
  document.getElementById('err').textContent='';
  stopTimerW();
  stopTimerB();
  var pos=getPos();
  var aw=calcPips(pos.white,true), ab=calcPips(pos.black,false);
  var sw=scoreGuess(gw,aw), sb=scoreGuess(gb,ab);
  stats.count++;
  var worst=Math.max(Math.abs(gw-aw),Math.abs(gb-ab));
  if(worst<=3) stats.ex++;
  else if(worst<=7) stats.good++;
  else stats.off++;
  updateScoreBar();
  var lead=aw<ab?'White leads by '+(ab-aw)+' pips':aw>ab?'Black leads by '+(aw-ab)+' pips':'Dead heat!';
  var wtStr=wStopped?fmtTime(wElapsed):'&mdash;';
  var btStr=bStopped?fmtTime(bElapsed):'&mdash;';
  function col(side,actual,guess,sc,tStr){
    return '<div class="result-col">'
      +'<div class="result-side">'+side+'</div>'
      +'<div class="result-actual">'+actual+'</div>'
      +'<div class="result-detail">Your guess: '+guess+' &middot; off by '+Math.abs(guess-actual)+'</div>'
      +'<div class="score-badge" style="border:1px solid '+sc.color+';color:'+sc.color+';background:'+sc.color+'18">'+sc.label+'</div>'
      +'<div style="font-size:14px;color:#999;margin-top:8px;">Time: '+tStr+'</div>'
      +'</div>';
  }
  document.getElementById('result-area').innerHTML='<div class="result-box">'
    +'<div class="result-title">RESULTS</div>'
    +'<div class="result-row">'+col('&#9675; White',aw,gw,sw,wtStr)+col('&#9679; Black',ab,gb,sb,btStr)+'</div>'
    +'<div class="result-lead">'+lead+'</div>'
    +'</div>';
}
 
function toggleHint(){
  showHint=!showHint;
  var pos=getPos();
  document.getElementById('hint-area').innerHTML=showHint?'<div class="hint-box">'+pos.hint+'</div>':'';
  document.getElementById('btn-hint').textContent=showHint?'Hide hint':'Hint';
}
 
function nextPos(){
  var n=posIdx;
  while(n===posIdx) n=Math.floor(Math.random()*POSITIONS.length);
  posIdx=n;
  render();
}
 
document.getElementById('btn-reveal').addEventListener('click',handleReveal);
document.getElementById('btn-hint').addEventListener('click',toggleHint);
document.getElementById('btn-next').addEventListener('click',nextPos);
document.getElementById('gb').addEventListener('keydown',function(e){if(e.key==='Enter')handleReveal();});
document.getElementById('gw').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('gb').focus();});
 
render();
</script>
</body>
</html>
